    { full: "앨범을 사다", blank: "___을 사다", answer: "앨범", choices: ["앨범", "옷", "신발", "가방"], vi: "Mua album", roman: "ael-beom-eul sa-da" },
    { full: "데뷔를 하다", blank: "___를 하다", answer: "데뷔", choices: ["데뷔", "졸업", "입학", "퇴근"], vi: "Ra mat", roman: "de-bwi-reul ha-da" },
    { full: "한국어를 배우다", blank: "___를 배우다", answer: "한국어", choices: ["한국어", "영어", "일본어", "중국어"], vi: "Hoc tieng Han", roman: "han-gug-eo-reul bae-u-da" },
    { full: "화이팅을 외치다", blank: "___을 외치다", answer: "화이팅", choices: ["화이팅", "만세", "대박", "최고"], vi: "Het len co len", roman: "hwa-i-ting-eul oe-chi-da" },
    { full: "기분이 좋다", blank: "___이 좋다", answer: "기분", choices: ["기분", "마음", "생각", "느낌"], vi: "Tam trang tot", roman: "gi-bun-i jo-ta" },
];

const correctReactions = ["Tuyet voi! 완벽해요! 👏", "Cool! 잘했어요! ⭐", "Nice! 대단해! 🎉", "Dung roi! 맞아요! ✨", "Perfect! 최고! 💜"];
const wrongReactions = ["Khong sao! 괜찮아요! 💪", "Co len! 화이팅! 🌟", "Gan dung roi! 다시 해봐요! 😊"];

let gameRunning = false, score = 0, combo = 0, maxCombo = 0, correctCount = 0, totalCount = 0, timeLeft = 50;
let currentSentence = null, timer = null, canAnswer = true;

// Audio - Mobile-friendly TTS
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    try {
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0;
        speechSynthesis.speak(u);
        audioUnlocked = true;
    } catch(e) {}
}

function playPronunciation() {
    if (!currentSentence) return;
    try {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentSentence.full);
        u.lang = 'ko-KR';
        u.rate = 0.8;
        u.volume = 1.0;
        const voices = speechSynthesis.getVoices();
        const koVoice = voices.find(v => v.lang.startsWith('ko'));
        if (koVoice) u.voice = koVoice;
        speechSynthesis.speak(u);
    } catch(e) {
        console.log('TTS failed:', e);
    }
}

if (typeof speechSynthesis !== 'undefined') {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function playNote(freq, dur, type, vol, delay) {
    try {
        const ctx = new AudioContext();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = type || 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(vol || 0.1, ctx.currentTime + (delay||0));
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay||0) + dur);
        o.connect(g); g.connect(ctx.destination);
        o.start(ctx.currentTime + (delay||0)); o.stop(ctx.currentTime + (delay||0) + dur);
    } catch(e) {}
}
function playCorrectSfx() { playNote(523, 0.08, 'sine', 0.12); playNote(659, 0.08, 'sine', 0.1, 0.04); }
function playWrongSfx() { playNote(200, 0.15, 'triangle', 0.06); }
function playComboSfx() { [523,659,784,1047].forEach((f,i) => playNote(f, 0.1, 'sine', 0.08, i*0.06)); }

// BGM
let bgmCtx=null, bgmInterval=null, bgmGain=null, bgmPlaying=false;
function startBGM() {
    if(bgmPlaying) return;
    bgmCtx = new (window.AudioContext||window.webkitAudioContext)();
    bgmGain = bgmCtx.createGain(); bgmGain.gain.value = 0.2; bgmGain.connect(bgmCtx.destination);
    bgmPlaying = true;
    let beat = 0;
    const mel = [330,370,415,440,494,440,415,370,330,294,330,370,415,440,494,523];
    const bas = [165,165,185,185,220,220,208,208,165,165,185,185,220,220,208,208];
    const bpm = 120, beatMs = 60000/bpm;
    bgmInterval = setInterval(() => {
        if(!bgmCtx) return;
        const idx = beat%16, t = bgmCtx.currentTime;
        const mO = bgmCtx.createOscillator(), mG = bgmCtx.createGain();
        mO.type='sine'; mO.frequency.value=mel[idx];
        mG.gain.setValueAtTime(0.04,t); mG.gain.exponentialRampToValueAtTime(0.001,t+beatMs/1000*0.7);
        mO.connect(mG); mG.connect(bgmGain); mO.start(t); mO.stop(t+beatMs/1000*0.7);
        const bO = bgmCtx.createOscillator(), bG = bgmCtx.createGain();
        bO.type='triangle'; bO.frequency.value=bas[idx];
        bG.gain.setValueAtTime(0.05,t); bG.gain.exponentialRampToValueAtTime(0.001,t+beatMs/1000*0.8);
        bO.connect(bG); bG.connect(bgmGain); bO.start(t); bO.stop(t+beatMs/1000*0.8);
        if(idx%4===0){const kO=bgmCtx.createOscillator(),kG=bgmCtx.createGain();kO.frequency.setValueAtTime(100,t);kO.frequency.exponentialRampToValueAtTime(40,t+0.06);kG.gain.setValueAtTime(0.07,t);kG.gain.exponentialRampToValueAtTime(0.001,t+0.08);kO.connect(kG);kG.connect(bgmGain);kO.start(t);kO.stop(t+0.08);}
        beat++;
    }, beatMs);
}
function stopBGM(){bgmPlaying=false;if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}if(bgmGain)try{bgmGain.gain.setValueAtTime(0,bgmCtx.currentTime);}catch(e){}}

function showReaction(correct) {
    const el = document.getElementById('teacherReaction');
    const txt = document.getElementById('reactionText');
    const list = correct ? correctReactions : wrongReactions;
    txt.textContent = list[Math.floor(Math.random() * list.length)];
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
}

function showQuestion() {
    if (!gameRunning) return;
    canAnswer = true;
    const idx = Math.floor(Math.random() * sentences.length);
    currentSentence = sentences[idx];

    document.getElementById('sentenceDisplay').innerHTML = currentSentence.blank.replace('___', '<span class="blank">?</span>');
    document.getElementById('sentenceVi').textContent = currentSentence.vi;
    document.getElementById('qLabel').textContent = `[${currentSentence.roman}] Dien vao cho trong:`;
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('feedback').style.display = 'none';

    const shuffled = [...currentSentence.choices].sort(() => Math.random() - 0.5);
    const area = document.getElementById('choicesArea');
    area.innerHTML = '';
    shuffled.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = () => handleAnswer(btn, c);
        area.appendChild(btn);
    });

    // User taps speaker button to hear pronunciation
}

function handleAnswer(btn, chosen) {
    if (!canAnswer || !gameRunning) return;
    canAnswer = false;
    totalCount++;
    const isCorrect = chosen === currentSentence.answer;
    const fb = document.getElementById('feedback');

    document.querySelectorAll('.choice-btn').forEach(b => {
        if (b.textContent === currentSentence.answer) b.classList.add('show-answer');
        if (b === btn && !isCorrect) b.classList.add('wrong');
        if (b === btn && isCorrect) b.classList.add('correct');
    });

    if (isCorrect) {
        correctCount++; combo++;
        if (combo > maxCombo) maxCombo = combo;
        const mult = combo >= 5 ? 3 : combo >= 3 ? 2 : 1;
        const points = 10 * mult;
        score += points;
        fb.className = 'feedback correct-fb';
        fb.innerHTML = `✅ ${currentSentence.full} = ${currentSentence.vi} (+${points})`;
        fb.style.display = 'block';
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('comboDisplay').textContent = combo >= 2 ? `${combo} COMBO! x${mult}` : '';
        if (combo >= 3) playComboSfx(); else playCorrectSfx();
        showReaction(true);
    } else {
        combo = 0;
        fb.className = 'feedback wrong-fb';
        fb.innerHTML = `❌ ${currentSentence.full} = ${currentSentence.vi}`;
        fb.style.display = 'block';
        document.getElementById('comboDisplay').textContent = '';
        playWrongSfx();
        showReaction(false);
    }
    setTimeout(() => { if (gameRunning) showQuestion(); }, isCorrect ? 800 : 1500);
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function startGame() {
    score=0; combo=0; maxCombo=0; correctCount=0; totalCount=0; timeLeft=50; gameRunning=true;
    document.getElementById('scoreDisplay').textContent = '0';
    document.getElementById('comboDisplay').textContent = '';
    document.getElementById('timerDisplay').textContent = '50';
    document.getElementById('timerDisplay').className = 'hud-timer';
    unlockAudio();
    showScreen('gameScreen'); startBGM(); showQuestion();
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').textContent = timeLeft;
        if (timeLeft <= 5) document.getElementById('timerDisplay').className = 'hud-timer urgent';
        if (timeLeft <= 0) endGame();
    }, 1000);
}

function endGame() {
    gameRunning = false; stopBGM();
    if (timer) { clearInterval(timer); timer = null; }
    const acc = totalCount > 0 ? Math.round((correctCount/totalCount)*100) : 0;
    let msg = acc >= 90 ? 'Xuat sac! 완벽! 🏆' : acc >= 70 ? 'Gioi lam! 잘했어! ⭐' : acc >= 50 ? 'Tot lam! 좋아! 👏' : 'Co len! 화이팅! 💪';
    document.getElementById('resultScore').textContent = score;
    document.getElementById('resultMsg').textContent = msg;
    document.getElementById('resultStats').innerHTML = `Dung: ${correctCount}/${totalCount} (${acc}%)<br>Combo cao nhat: ${maxCombo}`;
    document.getElementById('nameArea').style.display = 'flex';
    document.getElementById('nameInput').value = '';
    if (firebaseReady && db) { db.ref('kimi_team_total').transaction(v => (v||0)+score); loadTeamScore('endTeamValue'); }
    loadRankings('endRanking');
    showScreen('endScreen');
}

function loadRankings(targetId) {
    if (firebaseReady && db) {
        db.ref('kimi_rankings').orderByChild('score').limitToLast(10).once('value', snap => { renderRankings(snap.val(), targetId); });
    } else { renderRankings(null, targetId); }
}
function renderRankings(data, targetId) {
    const list = document.getElementById(targetId); list.innerHTML = '';
    const rankings = data ? Object.values(data).sort((a,b) => b.score-a.score) : [];
    if (!rankings.length) { list.innerHTML = '<li style="justify-content:center;color:#999;">Chua co ket qua</li>'; return; }
    rankings.slice(0,10).forEach((r,i) => {
        const li = document.createElement('li');
        const m = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
        li.innerHTML = `<span class="rank">${m}</span><span class="name">${r.name}</span><span class="pts">${r.score}</span>`;
        list.appendChild(li);
    });
}
function submitScore() {
    const name = document.getElementById('nameInput').value.trim() || 'Anonymous';
    if (firebaseReady && db) {
        db.ref('kimi_rankings').push({name, score, timestamp: Date.now()}).then(() => {
            db.ref('kimi_rankings').orderByChild('score').limitToLast(10).once('value', snap => { renderRankings(snap.val(), 'endRanking'); });
        });
    }
    document.getElementById('nameArea').style.display = 'none';
}
function loadTeamScore(targetId) {
    if (firebaseReady && db) { db.ref('kimi_team_total').once('value', snap => { document.getElementById(targetId).textContent = (snap.val()||0).toLocaleString(); }); }
}

loadRankings('startRanking');
loadTeamScore('startTeamValue');
</script>
